<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" role="img" aria-labelledby="title desc">
  <title id="title">Alfred</title>
  <desc id="desc">Logo Alfred fitness wellness you</desc>
  <defs>
    <linearGradient id="alfredGrad" x1="120" y1="80" x2="560" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#23c6bf"/>
      <stop offset="0.48" stop-color="#34d89a"/>
      <stop offset="1" stop-color="#2d6df6"/>
    </linearGradient>
    <linearGradient id="alfredText" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#253142"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#12202b" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="700" height="520" fill="none"/>
  <g filter="url(#softShadow)">
    <path d="M218 225 L310 72 C330 39 376 39 396 72 L486 225" fill="none" stroke="url(#alfredGrad)" stroke-width="54" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="352" cy="220" r="28" fill="url(#alfredGrad)"/>
  </g>
  <text x="350" y="382" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="104" font-weight="800" letter-spacing="-4" fill="url(#alfredText)">Alfred</text>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="10" text-anchor="middle">
    <text x="238" y="442" fill="#98a2b3">FITNESS</text>
    <circle cx="318" cy="435" r="4" fill="#2d9ff6"/>
    <text x="404" y="442" fill="#98a2b3">WELLNESS</text>
    <circle cx="510" cy="435" r="4" fill="#52cf46"/>
    <text x="574" y="442" fill="#98a2b3">YOU</text>
  </g>
